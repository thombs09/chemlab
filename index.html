<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemLab 2C</title>

<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Nunito',sans-serif;
background: radial-gradient(circle at 20% 20%, #0b1b33, #070B14 60%);
color:#cfefff;
overflow-x:hidden;
}

header{
text-align:center;
padding:2rem;
}

h1{
font-size:3.5rem;
font-weight:900;
background:linear-gradient(90deg,#00D4FF,#B026FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
display:flex;
max-width:700px;
margin:0 auto;
border:1px solid #1f3b57;
border-radius:14px;
overflow:hidden;
}

input{
flex:1;
padding:1rem;
background:#0B1220;
border:none;
color:white;
font-size:1rem;
outline:none;
}

button{
padding:1rem 1.2rem;
background:#00D4FF;
border:none;
font-weight:900;
cursor:pointer;
}

.container{
max-width:1000px;
margin:2rem auto;
padding:1rem;
}

.card{
background:rgba(11,18,32,.6);
backdrop-filter: blur(10px);
border:1px solid rgba(0,212,255,.25);
padding:1.5rem;
border-radius:16px;
margin-top:1rem;
}

.big{
font-size:2.5rem;
font-weight:900;
color:#00D4FF;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:1rem;
margin-top:1rem;
}

.box{
background:#0f1a2b;
border:1px solid #1f3b57;
padding:1rem;
border-radius:12px;
}

.label{font-size:.7rem;color:#6aa6c9;}
.value{font-weight:800;}

img{
display:block;
margin:1rem auto;
background:white;
padding:10px;
border-radius:12px;
}

/* 3D BOX */
.viewer3d{
width:100%;
height:350px;
margin-top:1rem;
border-radius:12px;
overflow:hidden;
border:1px solid #1f3b57;
}

.loading{
text-align:center;
color:#00D4FF;
font-weight:800;
}

.aiBtn{
margin-top:1rem;
padding:.8rem 1.4rem;
border-radius:999px;
border:none;
background:#20e37a;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>ChemLab 2C</h1>
<p>3D Molecular Viewer</p>
</header>

<div class="search">
<input id="q" placeholder="H2SO4, Fe2O3, glucosio..." onkeydown="if(event.key==='Enter')search()">
<button onclick="search()">SCAN</button>
</div>

<div class="container" id="out"></div>

<script>

let lastCID = "";
let lastName = "";
let lastFormula = "";

/* CID */
async function cid(name){
let r = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/cids/JSON`);
if(!r.ok) return null;
let j = await r.json();
return j?.IdentifierList?.CID?.[0] || null;
}

/* SEARCH */
async function search(){

let q = document.getElementById("q").value.trim();
let out = document.getElementById("out");

if(!q){
out.innerHTML = "Inserisci composto";
return;
}

out.innerHTML = `<div class="loading">Caricamento struttura...</div>`;

let id = await cid(q);

if(!id){
out.innerHTML = "Non trovato";
return;
}

lastCID = id;

let r = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/property/MolecularFormula,MolecularWeight,IUPACName/JSON`);
let j = await r.json();
let p = j.PropertyTable.Properties[0];

lastName = p.IUPACName;
lastFormula = p.MolecularFormula;

let img = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/PNG`;

/* VIEWER 3D URL (SDF) */
let sdfURL = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/SDF`;

out.innerHTML = `
<div class="card">

<div class="big">${p.MolecularFormula}</div>
<div><b>${p.IUPACName}</b></div>

<img src="${img}" width="220">

<div class="grid">
<div class="box"><div class="label">Massa</div><div class="value">${p.MolecularWeight}</div></div>
<div class="box"><div class="label">CID</div><div class="value">${id}</div></div>
</div>

<div id="viewer" class="viewer3d"></div>

<button class="aiBtn" onclick="askAI()">Chiedi AI</button>
<div id="aiOut"></div>

</div>
`;

/* 3D MOLECULE */
setTimeout(() => {
let element = document.getElementById("viewer");

let viewer = $3Dmol.createViewer(element, {backgroundColor: "#0B1220"});

fetch(sdfURL)
.then(r => r.text())
.then(data => {
viewer.addModel(data, "sdf");
viewer.setStyle({}, {stick:{}});
viewer.zoomTo();
viewer.render();
});
}, 200);

}

/* AI (facoltativo) */
async function askAI(){

let out = document.getElementById("aiOut");
out.innerHTML = "AI...";

let r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyCTfq1Z1bw10I2xjJdebzkohTh_07leJQs",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:`Spiega in italiano: ${lastName} ${lastFormula}`}]}]
})
});

let d = await r.json();

out.innerHTML = d?.candidates?.[0]?.content?.parts?.[0]?.text || "errore";
}

</script>

</body>
</html>
