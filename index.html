<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemLab 2C</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Nunito',sans-serif;
color:#cfefff;
background: radial-gradient(circle at 20% 20%, #0b1b33, #070B14 60%);
overflow-x:hidden;
}

/* glow */
body::before,
body::after{
content:"";
position:fixed;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
opacity:.25;
z-index:-1;
animation: float 10s ease-in-out infinite;
}

body::before{
background:#00D4FF;
top:-100px;
left:-100px;
}

body::after{
background:#B026FF;
bottom:-120px;
right:-120px;
animation-delay:-5s;
}

@keyframes float{
0%,100%{transform:translate(0,0);}
50%{transform:translate(40px,20px);}
}

header{
text-align:center;
padding:2rem;
}

h1{
font-size:3.5rem;
font-weight:900;
background:linear-gradient(90deg,#00D4FF,#B026FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
display:flex;
max-width:700px;
margin:0 auto;
border:1px solid #1f3b57;
border-radius:14px;
overflow:hidden;
}

input{
flex:1;
padding:1rem;
background:#0B1220;
border:none;
color:white;
outline:none;
}

button{
padding:1rem 1.2rem;
background:#00D4FF;
border:none;
font-weight:900;
cursor:pointer;
}

button:hover{background:#00a8cc;}

.aiBtn{
margin-top:1.5rem;
padding:.9rem 1.6rem;
background:#20e37a;
border:none;
border-radius:999px;
font-weight:900;
cursor:pointer;
color:#06210f;
box-shadow:0 0 18px rgba(32,227,122,.35);
}

.container{
max-width:1000px;
margin:2rem auto;
padding:1rem;
}

.card{
background:rgba(11,18,32,.65);
backdrop-filter: blur(12px);
border:1px solid rgba(0,212,255,.25);
padding:1.5rem;
border-radius:18px;
margin-top:1rem;
}

.big{
font-size:2.5rem;
font-weight:900;
color:#00D4FF;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:1rem;
margin-top:1rem;
}

.box{
background:#0f1a2b;
border:1px solid #1f3b57;
padding:1rem;
border-radius:12px;
}

.label{font-size:.7rem;color:#6aa6c9;}
.value{font-weight:800;}

img{
display:block;
margin:2rem auto;
background:white;
padding:10px;
border-radius:12px;
}

.loading{
text-align:center;
color:#00D4FF;
font-weight:800;
margin-top:2rem;
}

.error{
color:#ff5c5c;
text-align:center;
margin-top:1rem;
}

/* LOADER FIXATO */
.molecule-loader{
width:60px;
height:60px;
margin:0 auto 10px auto;
position:relative;
}

.atom{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
background:radial-gradient(circle,#00D4FF,#0088ff);
top:50%;
left:50%;
animation:orbit 1.1s linear infinite;
box-shadow:0 0 10px rgba(0,212,255,.6);
}

.atom:nth-child(1){animation-delay:0s;}
.atom:nth-child(2){animation-delay:0.4s;}
.atom:nth-child(3){animation-delay:0.8s;}

@keyframes orbit{
0%{transform:rotate(0deg) translateX(22px) rotate(0deg);}
100%{transform:rotate(360deg) translateX(22px) rotate(-360deg);}
}
</style>
</head>

<body>

<header>
<h1>ChemLab 2C</h1>
<p>di Pizzamiglio, Mabrouk, Gorodenco, Ramera, Parigi.</p>
</header>

<div class="search">
<input id="q" placeholder="H2SO4, Fe2O3, NH4+, glucosio..." onkeydown="if(event.key==='Enter')search()">
<button onclick="search()">SCAN</button>
</div>

<div class="container" id="out"></div>

<script>

let lastName = "";
let lastFormula = "";

function sub(s){
return s?.replace(/(\d+)/g,d=>[...d].map(x=>"₀₁₂₃₄₅₆₇₈₉"[x]).join(''));
}

const map={
glucosio:"glucose",
acqua:"water",
ferro:"iron",
oro:"gold",
rame:"copper",
argento:"silver",
etanolo:"ethanol",
metano:"methane",
aspirina:"aspirin"
};

async function cid(name){
let r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/cids/JSON`);
if(!r.ok)return null;
let j=await r.json();
return j?.IdentifierList?.CID?.[0]||null;
}

async function ai(name, formula){

const r = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyCTfq1Z1bw10I2xjJdebzkohTh_07leJQs",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
contents:[{
parts:[{
text:`Sei un assistente di chimica. Rispondi SOLO in italiano.

Nome: ${name}
Formula: ${formula}`
}]
}]
})
}
);

const data = await r.json();
return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No AI response";
}

async function search(){

let q=document.getElementById("q").value.trim();
let out=document.getElementById("out");

if(!q){
out.innerHTML="<div class='error'>Inserisci un composto</div>";
return;
}

out.innerHTML=`
<div class="loading">
<div class="molecule-loader">
<div class="atom"></div>
<div class="atom"></div>
<div class="atom"></div>
</div>
Analisi...
</div>
`;

let term=map[q.toLowerCase()]||q;
let id=await cid(term);

if(!id){
out.innerHTML="<div class='error'>Non trovato</div>";
return;
}

let r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/property/MolecularFormula,MolecularWeight,IUPACName,Charge/JSON`);
let j=await r.json();
let p=j?.PropertyTable?.Properties?.[0];

lastName = p.IUPACName || term;
lastFormula = p.MolecularFormula;

let img=`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/PNG`;

out.innerHTML=`
<div class='card'>
<div class='big'>${sub(p.MolecularFormula)}</div>
<div><b>${lastName}</b></div>

<img src='${img}' width='260'>

<div class='grid'>
<div class='box'><div class='label'>Massa</div><div class='value'>${p.MolecularWeight}</div></div>
<div class='box'><div class='label'>Carica</div><div class='value'>${p.Charge}</div></div>
</div>

<button class='aiBtn' onclick='askAI()'>Chiedi ad AI ✨</button>
<div id='aiOut' class='card'></div>
`;
}

async function askAI(){
let out=document.getElementById("aiOut");
out.innerHTML="AI in elaborazione...";
let res=await ai(lastName,lastFormula);
out.innerHTML=res;
}

</script>

</body>
</html>
