<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemLab</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Nunito',sans-serif;
background:#070B14;
color:#cfefff;
}

header{
text-align:center;
padding:2rem;
}

h1{
font-size:3.5rem;
font-weight:900;
background:linear-gradient(90deg,#00D4FF,#B026FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
display:flex;
max-width:700px;
margin:0 auto;
border:1px solid #1f3b57;
border-radius:14px;
overflow:hidden;
}

input{
flex:1;
padding:1rem;
background:#0B1220;
border:none;
color:white;
font-size:1rem;
outline:none;
}

button{
padding:1rem 1.2rem;
background:#00D4FF;
border:none;
font-weight:900;
cursor:pointer;
}

button:hover{background:#00a8cc;}

.aiBtn{
margin-top:1.5rem;
padding:.9rem 1.6rem;
background:#20e37a;
border:none;
border-radius:999px;
font-weight:900;
cursor:pointer;
color:#06210f;
box-shadow:0 0 18px rgba(32,227,122,.35);
}

.container{
max-width:1000px;
margin:2rem auto;
padding:1rem;
}

.card{
background:#0B1220;
border:1px solid #1f3b57;
padding:1.5rem;
border-radius:16px;
margin-top:1rem;
}

.big{
font-size:2.5rem;
font-weight:900;
color:#00D4FF;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:1rem;
margin-top:1rem;
}

.box{
background:#0f1a2b;
border:1px solid #1f3b57;
padding:1rem;
border-radius:12px;
}

.label{font-size:.7rem;color:#6aa6c9;}
.value{font-weight:800;margin-top:.3rem;word-break:break-word;}

img{
display:block;
margin:2rem auto;
background:white;
padding:10px;
border-radius:12px;
}

.ai{
margin-top:2rem;
padding:1.5rem;
border-radius:14px;
background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(176,38,255,.08));
border:1px solid #1f3b57;
}

.loading{
text-align:center;
margin-top:2rem;
color:#00D4FF;
font-weight:800;
}

.error{
color:#ff5c5c;
text-align:center;
margin-top:1rem;
}

/* loader */
.molecule-loader{
width:60px;height:60px;margin:0 auto 10px auto;position:relative;
}
.atom{
position:absolute;width:10px;height:10px;border-radius:50%;
background:#00D4FF;top:50%;left:50%;
transform-origin:0 0;
animation:orbit 1.2s linear infinite;
}
.atom:nth-child(2){animation-delay:.4s;}
.atom:nth-child(3){animation-delay:.8s;}

@keyframes orbit{
0%{transform:rotate(0deg) translateX(20px) rotate(0deg);}
100%{transform:rotate(360deg) translateX(20px) rotate(-360deg);}
}
</style>
</head>

<body>

<header>
<h1>ChemLab 2C</h1>
<p>di Pizzamiglio, Mabrouk, Gorodenco, Ramera, Parigi.</p>
</header>

<div class="search">
<input id="q" placeholder="H2SO4, Fe2O3, NH4+, glucosio..." onkeydown="if(event.key==='Enter')search()">
<button onclick="search()">SCAN</button>
</div>

<div class="container" id="out"></div>

<script>

let lastName = "";
let lastFormula = "";

function sub(s){
return s?.replace(/(\d+)/g,d=>[...d].map(x=>"₀₁₂₃₄₅₆₇₈₉"[x]).join(''));
}

/* input base */
const map={
glucosio:"glucose",
acqua:"water",
ferro:"iron",
oro:"gold",
rame:"copper",
argento:"silver",
etanolo:"ethanol",
metano:"methane",
aspirina:"aspirin"
};

/* CID */
async function cid(name){
let r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/cids/JSON`);
if(!r.ok)return null;
let j=await r.json();
return j?.IdentifierList?.CID?.[0]||null;
}

/* AI */
async function ai(name, formula){

const r = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyCTfq1Z1bw10I2xjJdebzkohTh_07leJQs",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
contents:[{
parts:[{
text:`Sei un assistente di chimica.

Rispondi SOLO in italiano e SOLO nel formato:

🧪 Nome: ${name}
🧬 Formula: ${formula}

📌 Classificazione:
- punto 1
- punto 2
- punto 3

⚗️ Proprietà fondamentali:
- punto 1
- punto 2
- punto 3
- punto 4

⚡ Funzione principale:
- punto 1
- punto 2

🧠 Riassunto:
- una frase semplice`
}]
}]
})
}
);

const data = await r.json();
if(data?.error) return "AI error: " + data.error.message;

return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No AI response";
}

/* NOME INTELLIGENTE */
function getChemName(p, term){

const title = p.Title;
const iupac = p.IUPACName;

function bad(n){
return !n || n.length > 60 || n.includes("(");
}

const dictIT = {
"water":"acqua",
"glucose":"glucosio",
"iron":"ferro",
"iron(iii) oxide":"ossido di ferro(III)",
"ammonium":"ione ammonio",
"sulfuric acid":"acido solforico",
"nitric acid":"acido nitrico",
"hydrochloric acid":"acido cloridrico",
"methane":"metano",
"ethanol":"etanolo"
};

let base =
!bad(title) ? title :
!bad(iupac) ? iupac :
term;

let it = dictIT[base.toLowerCase()] || null;

return {main: base, it};
}

/* SEARCH */
async function search(){

let q=document.getElementById("q").value.trim();
let out=document.getElementById("out");

if(!q){
out.innerHTML="<div class='error'>Inserisci un composto</div>";
return;
}

out.innerHTML=`
<div class="loading">
<div class="molecule-loader">
<script>

let lastName = "";
let lastFormula = "";

function sub(s){
return s?.replace(/(\d+)/g,d=>[...d].map(x=>"₀₁₂₃₄₅₆₇₈₉"[x]).join(''));
}

/* INPUT BASE */
const map={
glucosio:"glucose",
acqua:"water",
ferro:"iron",
oro:"gold",
rame:"copper",
argento:"silver",
etanolo:"ethanol",
metano:"methane",
aspirina:"aspirin"
};

/* DIZIONARIO ITALIANO */
const dictIT = {
"water":"acqua",
"glucose":"glucosio",
"iron":"ferro",
"iron(iii) oxide":"ossido di ferro(III)",
"iron(3+) oxide":"ossido di ferro(III)",
"diiron trioxide":"ossido di ferro(III)",
"ammonium":"ione ammonio",
"sulfuric acid":"acido solforico",
"nitric acid":"acido nitrico",
"hydrochloric acid":"acido cloridrico",
"methane":"metano",
"ethanol":"etanolo"
};

/* RICONOSCE FORMULA */
function isFormula(q){
return /^[A-Za-z0-9()+\-]+$/.test(q);
}

/* CID */
async function cid(name){

let type = isFormula(name) ? "formula" : "name";

let r = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/${type}/${encodeURIComponent(name)}/cids/JSON`
);

if(!r.ok) return null;

let j = await r.json();

return j?.IdentifierList?.CID?.[0] || null;
}

/* PRENDE SYNONYMS */
async function getSynonyms(id){

let r = await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/synonyms/JSON`
);

if(!r.ok) return [];

let j = await r.json();

return j?.InformationList?.Information?.[0]?.Synonym || [];
}

/* CONTROLLA NOMI SCARSI */
function bad(n){
return !n || n.length > 60;
}

/* SCEGLIE NOME MIGLIORE */
async function getChemName(p, term, id){

let title = p.Title;
let iupac = p.IUPACName;

let synonyms = await getSynonyms(id);

/* cerca nome leggibile nei synonyms */
let synGood = synonyms.find(s =>
s.length < 40 &&
!/^\d+$/.test(s) &&
!/^[A-Z0-9()+\-]+$/.test(s)
);

let base =
!bad(synGood) ? synGood :
!bad(title) ? title :
!bad(iupac) ? iupac :
term;

let it = dictIT[base.toLowerCase()] || null;

return {main: base, it};
}

/* AI */
async function ai(name, formula){

const r = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=YOUR_KEY",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
contents:[{
parts:[{
text:`Sei un assistente di chimica.

Rispondi SOLO in italiano e SOLO nel formato:

🧪 Nome: ${name}
🧬 Formula: ${formula}

📌 Classificazione:
- punto 1
- punto 2
- punto 3

⚗️ Proprietà fondamentali:
- punto 1
- punto 2
- punto 3
- punto 4

⚡ Funzione principale:
- punto 1
- punto 2

🧠 Riassunto:
- una frase semplice`
}]
}]
})
}
);

const data = await r.json();

if(data?.error)
return "AI error: " + data.error.message;

return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No AI response";
}

/* SEARCH */
async function search(){

let q=document.getElementById("q").value.trim();
let out=document.getElementById("out");

if(!q){
out.innerHTML="<div class='error'>Inserisci un composto</div>";
return;
}

out.innerHTML=`
<div class="loading">
<div class="molecule-loader">
<div class="atom"></div>
<div class="atom"></div>
<div class="atom"></div>
</div>
Analisi molecolare...
</div>
`;

let term=map[q.toLowerCase()]||q;

let id=await cid(term);

if(!id){
out.innerHTML="<div class='error'>Non trovato</div>";
return;
}

/* proprietà base */
let r=await fetch(
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/property/MolecularFormula,MolecularWeight,IUPACName,Title,Charge/JSON`
);

let j=await r.json();

let p=j?.PropertyTable?.Properties?.[0];

/* nome intelligente */
const nameObj =
await getChemName(p, term, id);

lastName = nameObj.main;
lastFormula = p.MolecularFormula;

let secondary = nameObj.it;

let img=`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/PNG`;

out.innerHTML=`
<div class='card'>

<div class='big'>
${sub(p.MolecularFormula)}
</div>

<div>
<b>${nameObj.main}</b>
</div>

${secondary ?
`<div style="opacity:.75;font-size:.95rem">
🇮🇹 ${secondary}
</div>` : ""}

<img src='${img}' width='260'>

<div class='grid'>

<div class='box'>
<div class='label'>Massa</div>
<div class='value'>${p.MolecularWeight}</div>
</div>

<div class='box'>
<div class='label'>Carica</div>
<div class='value'>${p.Charge}</div>
</div>

<div class='box'>
<div class='label'>PubChem</div>
<div class='value'>
<a href="https://pubchem.ncbi.nlm.nih.gov/compound/${id}"
target="_blank"
style="color:#00D4FF;text-decoration:none;">
Apri scheda
</a>
</div>
</div>

</div>

<button class='aiBtn'
onclick='askAI()'>
Chiedi ad AI ✨
</button>

<div id='aiOut' class='ai'></div>

</div>
`;
}

/* AI BUTTON */
async function askAI(){

let out=document.getElementById("aiOut");

out.innerHTML=
"<div class='loading'>AI in elaborazione...</div>";

let res =
await ai(lastName,lastFormula);

out.innerHTML =
`<b>ChemLab AI</b><p>${res}</p>`;
}

</script>

</body>
</html>
